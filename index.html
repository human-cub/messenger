<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#517da2">
<title>Мессенджер</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23517da2'/%3E%3Cpath d='M14 32l36-14-7 36-13-9-7 7-3-13z' fill='%23fff'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 15px; color: #222;
    background: #e6ebee;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  .hidden { display: none !important; }

  /* AUTH */
  #auth-screen {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #6c98c0 0%, #517da2 100%);
    padding: 20px;
    z-index: 50;
  }
  #auth-card {
    width: 100%; max-width: 340px;
    background: #fff; border-radius: 14px; padding: 24px 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  #auth-card h1 { margin: 0 0 4px; font-size: 22px; text-align: center; color: #2c3e50; }
  #auth-card p.sub { margin: 0 0 18px; text-align: center; color: #888; font-size: 13px; }
  .field { margin-bottom: 12px; }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 1px solid #d0d7de; border-radius: 10px;
    background: #f6f8fa; outline: none;
    font-size: 16px;
  }
  .field input:focus { border-color: #517da2; background: #fff; }
  .btn {
    display: block; width: 100%;
    padding: 12px 14px; margin-top: 6px;
    background: #517da2; color: #fff;
    border-radius: 10px; font-weight: 600; font-size: 16px;
    text-align: center;
  }
  .btn:active { background: #466b8a; }
  .btn.secondary { background: #eef2f5; color: #517da2; }
  .btn.secondary:active { background: #dde4ea; }
  .auth-toggle { text-align: center; margin-top: 14px; font-size: 14px; color: #517da2; }
  #auth-error { color: #c0392b; font-size: 13px; min-height: 18px; text-align: center; margin: 4px 0 8px; }

  /* APP LAYOUT */
  #app { position: absolute; inset: 0; display: flex; }
  #sidebar {
    width: 33%; min-width: 240px; max-width: 340px;
    background: #fff; border-right: 1px solid #d6dde2;
    display: flex; flex-direction: column;
  }
  #sidebar-header {
    padding: 12px 14px; border-bottom: 1px solid #e6ebee;
    display: flex; align-items: center; justify-content: space-between;
    background: #f6f8fa;
  }
  #sidebar-header .me { font-weight: 600; color: #2c3e50; }
  #sidebar-header .me small { display: block; font-weight: 400; color: #888; font-size: 12px; }
  #sidebar-header .icon-btn { padding: 6px; border-radius: 8px; }
  #sidebar-header .icon-btn:active { background: #e6ebee; }
  #contacts-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .contact-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid #f0f3f5;
    cursor: pointer;
  }
  .contact-row.active { background: #e8f0f7; }
  .contact-row:active { background: #dde7ef; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: #517da2; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; flex-shrink: 0;
  }
  .contact-row .info { flex: 1; min-width: 0; }
  .contact-row .name { font-weight: 600; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-row .preview { color: #888; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-row .badge {
    background: #e74c3c; color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 10px; padding: 2px 7px; min-width: 18px; text-align: center;
  }

  /* CHAT */
  #chat { flex: 1; display: flex; flex-direction: column; background: #e6ebee; min-width: 0; }
  #chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 15px; text-align: center; padding: 20px;
  }
  #chat-main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #chat-header {
    padding: 10px 14px; background: #f6f8fa;
    border-bottom: 1px solid #d6dde2;
    display: flex; align-items: center; gap: 10px;
  }
  #chat-header .name { flex: 1; font-weight: 600; color: #2c3e50; }
  #chat-header .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #517da2;
  }
  #chat-header .icon-btn:active { background: #e6ebee; }
  #chat-header .back-btn { display: none; }
  #messages {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 10px 12px;
    background-image: linear-gradient(180deg, #e6ebee 0%, #dee5e9 100%);
  }
  .msg { display: flex; margin-bottom: 6px; }
  .msg.out { justify-content: flex-end; }
  .bubble {
    max-width: 75%; padding: 7px 11px 6px;
    border-radius: 12px;
    background: #fff; color: #222;
    box-shadow: 0 1px 1px rgba(0,0,0,0.06);
    word-wrap: break-word; word-break: break-word;
    font-size: 15px;
  }
  .msg.out .bubble { background: #d3eafd; }
  .bubble .time { font-size: 10px; color: #999; text-align: right; margin-top: 2px; }
  .bubble img, .bubble video { max-width: 100%; max-height: 320px; border-radius: 8px; display: block; }
  .bubble audio { width: 230px; max-width: 100%; }

  #composer {
    background: #f6f8fa; border-top: 1px solid #d6dde2;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
    display: flex; align-items: flex-end; gap: 6px;
  }
  #composer .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #517da2;
  }
  #composer .icon-btn:active { background: #e6ebee; }
  #composer #send-btn { background: #517da2; color: #fff; }
  #composer #send-btn:active { background: #466b8a; }
  #composer #mic-btn.recording { background: #e74c3c; color: #fff; }
  #composer #mic-btn { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  #text-input {
    flex: 1; min-width: 0;
    padding: 9px 12px;
    background: #fff; border: 1px solid #d0d7de; border-radius: 18px;
    resize: none; outline: none;
    font-size: 16px; line-height: 1.3;
    max-height: 120px;
    overflow-y: auto;
    -webkit-appearance: none;
  }
  #text-input:focus { border-color: #517da2; }

  /* MODAL */
  .modal-bg {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: #fff; border-radius: 12px; padding: 18px 16px;
    width: 100%; max-width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .modal h2 { margin: 0 0 12px; font-size: 18px; color: #2c3e50; }
  .modal .row { display: flex; gap: 8px; margin-top: 10px; }
  .modal .row .btn { margin-top: 0; }

  /* CALL SCREEN */
  #call-screen {
    position: absolute; inset: 0; z-index: 200;
    background: #1d2b3a; color: #fff;
    display: flex; flex-direction: column; align-items: center;
  }
  #call-screen .video-area { position: absolute; inset: 0; background: #000; }
  #call-screen video { width: 100%; height: 100%; object-fit: cover; background: #000; }
  #call-screen video.local { position: absolute; right: 12px; top: 12px; width: 100px; height: 140px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.4); object-fit: cover; }
  #call-screen .top {
    position: relative; z-index: 2;
    padding: calc(20px + env(safe-area-inset-top, 30px)) 20px 20px;
    text-align: center; width: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0));
  }
  #call-screen .top .name { font-size: 22px; font-weight: 600; }
  #call-screen .top .status { color: #cbd5e0; font-size: 14px; margin-top: 4px; }
  #call-screen .controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 30px 20px calc(30px + env(safe-area-inset-bottom, 0px));
    display: flex; justify-content: center; gap: 24px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    z-index: 2;
  }
  #call-screen .ctl {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  #call-screen .ctl.accept { background: #2ecc71; }
  #call-screen .ctl.decline, #call-screen .ctl.hangup { background: #e74c3c; }
  #call-screen .ctl.mute { background: rgba(255,255,255,0.2); }
  #call-screen .ctl.mute.on { background: rgba(255,255,255,0.5); }

  /* RECORDING INDICATOR */
  #recording-indicator {
    position: absolute; bottom: 70px; left: 0; right: 0;
    text-align: center; pointer-events: none;
    z-index: 3;
  }
  #recording-indicator .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; background: #e74c3c; color: #fff;
    border-radius: 20px; font-size: 14px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #recording-indicator .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff; animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* SMALL SCREENS */
  @media (max-width: 600px) {
    #sidebar { width: 100%; max-width: none; }
    #chat { display: none; }
    body.in-chat #sidebar { display: none; }
    body.in-chat #chat { display: flex; }
    #chat-header .back-btn { display: flex; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div id="auth-card">
    <h1>Мессенджер</h1>
    <p class="sub" id="auth-sub">Войти в аккаунт</p>
    <div class="field"><input id="auth-username" type="text" placeholder="Никнейм" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"></div>
    <div class="field"><input id="auth-password" type="password" placeholder="Пароль" autocomplete="current-password"></div>
    <div id="auth-error"></div>
    <button class="btn" id="auth-submit">Войти</button>
    <div class="auth-toggle">
      <a href="#" id="auth-toggle-link">Нет аккаунта? Зарегистрироваться</a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="me">
        <span id="me-name">…</span>
        <small id="me-username"></small>
      </div>
      <button class="icon-btn" id="add-contact-btn" title="Добавить контакт" aria-label="Добавить контакт">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="icon-btn" id="logout-btn" title="Выйти" aria-label="Выйти">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <div id="contacts-list"></div>
  </aside>

  <section id="chat">
    <div id="chat-empty">Выбери контакт чтобы начать переписку</div>
    <div id="chat-main" class="hidden">
      <div id="chat-header">
        <button class="icon-btn back-btn" id="back-btn" aria-label="Назад">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="avatar" id="chat-avatar">?</div>
        <div class="name" id="chat-name">Контакт</div>
        <button class="icon-btn" id="audio-call-btn" title="Аудиозвонок" aria-label="Аудиозвонок">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
        </button>
        <button class="icon-btn" id="video-call-btn" title="Видеозвонок" aria-label="Видеозвонок">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
      </div>
      <div id="messages"></div>
      <div id="composer">
        <button class="icon-btn" id="attach-btn" title="Прикрепить" aria-label="Прикрепить">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="file-input" accept="image/*,video/*" class="hidden">
        <textarea id="text-input" rows="1" placeholder="Сообщение" autocapitalize="sentences" autocorrect="off" spellcheck="false"></textarea>
        <button class="icon-btn" id="mic-btn" title="Голосовое (зажать)" aria-label="Голосовое">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="icon-btn hidden" id="send-btn" title="Отправить" aria-label="Отправить">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </section>
</div>

<!-- ADD CONTACT MODAL -->
<div id="add-contact-modal" class="modal-bg hidden">
  <div class="modal">
    <h2>Добавить контакт</h2>
    <div class="field"><input id="add-contact-input" type="text" placeholder="Никнейм" autocapitalize="none" autocorrect="off" spellcheck="false"></div>
    <div id="add-contact-error" style="color:#c0392b;font-size:13px;min-height:18px;"></div>
    <div class="row">
      <button class="btn secondary" id="add-contact-cancel">Отмена</button>
      <button class="btn" id="add-contact-ok">Добавить</button>
    </div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call-screen" class="hidden">
  <div class="video-area">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" class="local" autoplay playsinline muted></video>
  </div>
  <div class="top">
    <div class="name" id="call-name">…</div>
    <div class="status" id="call-status">Соединение…</div>
  </div>
  <div id="recording-indicator" class="hidden"><div class="pill"><span class="dot"></span><span id="rec-time">0:00</span></div></div>
  <div class="controls" id="call-controls"></div>
</div>

<audio id="ringtone" loop></audio>

<script>
  // Загрузка Supabase SDK с фолбэком на случай блокировки CDN.
  (function () {
    var sources = [
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js',
      'https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js',
      'https://esm.sh/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js'
    ];
    function tryNext(i) {
      if (i >= sources.length) {
        document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#c00;">Не удалось загрузить SDK ни с одного CDN. Скачай supabase.min.js и положи рядом с index.html.</div>';
        return;
      }
      var s = document.createElement('script');
      s.src = sources[i];
      s.onload = function () {
        var a = document.createElement('script'); a.src = 'app.js'; document.body.appendChild(a);
      };
      s.onerror = function () { tryNext(i + 1); };
      document.body.appendChild(s);
    }
    tryNext(0);
  })();
</script>
</body>
</html>
